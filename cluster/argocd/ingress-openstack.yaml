apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-openstack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3
    helm:
      values: |
        controller:
          ingressClass: ingress-openstack
          admissionWebhooks:
            enabled: false
          ingressClassResource:
            name: ingress-openstack
            enabled: true
            default: false
            controllerValue: k8s.io/ingress-nginx
          podLabels:
            app: ingress-api
          publishService:
            enabled: true
          service:
            type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

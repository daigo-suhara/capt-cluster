apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-horizon
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "14"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm
    path: horizon
    targetRevision: master
    helm:
      values: |
        # force Argo CD refresh
        helm3_hook: false
        manifests:
          job_db_init: true
          job_db_sync: false
          job_ks_user: true
          job_ks_service: true
          ingress_api: true
          service_ingress: true
        conf:
          horizon:
            apache: |
              LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
              LogFormat "%{X-Forwarded-For}i %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" proxy
              SetEnvIf X-Forwarded-For "^.*\..*\..*\..*" forwarded
              CustomLog /dev/stdout combined env=!forwarded
              CustomLog /dev/stdout proxy env=forwarded
              <VirtualHost *:{{ tuple "dashboard" "internal" "web" . | include "helm-toolkit.endpoints.endpoint_port_lookup" }}>
                WSGIApplicationGroup %{GLOBAL}
                WSGIScriptReloading On
                WSGIDaemonProcess horizon-http processes=5 threads=1 user=horizon group=horizon display-name=%{GROUP}
                WSGIProcessGroup horizon-http
                WSGIScriptAlias / /var/www/cgi-bin/horizon/django.wsgi
                WSGIPassAuthorization On
                RewriteEngine on
                RewriteCond %{REQUEST_METHOD} !^(POST|PUT|GET|DELETE|PATCH)
                RewriteRule .* - [F]
                <Location "/">
                    Require all granted
                </Location>
                Alias /static /var/www/html/horizon
                <Location "/static">
                    SetHandler static
                </Location>
                ErrorLogFormat "%{cu}t %M"
                ErrorLog /dev/stdout
                TransferLog /dev/stdout
                SetEnvIf X-Forwarded-For "^.*\..*\..*\..*" forwarded
                CustomLog /dev/stdout combined env=!forwarded
                CustomLog /dev/stdout proxy env=forwarded
              </Virtualhost>
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash

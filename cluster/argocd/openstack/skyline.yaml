apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-skyline
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm
    path: skyline
    targetRevision: master
    helm:
      values: |
        # force Argo CD refresh
        helm3_hook: false
        pod:
          replicas:
            skyline: 1
        manifests:
          ingress: true
          service_ingress: true
          job_db_init: true
          job_db_sync: true
          job_ks_user: true
        dependencies:
          static:
            skyline:
              jobs: []
        conf:
          skyline:
            openstack:
              system_user_name: admin
              system_user_password: password
              system_user_domain: default
              system_project: admin
              system_project_domain: default
        extraObjects:
          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: skyline-domains
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: skyline-domains
              template:
                metadata:
                  labels:
                    app: skyline-domains
                spec:
                  containers:
                    - name: domains
                      image: quay.io/airshipit/openstack-client:2026.1-ubuntu_noble
                      command:
                        - python3
                        - -c
                        - |
                          from http.server import BaseHTTPRequestHandler, HTTPServer

                          class Handler(BaseHTTPRequestHandler):
                              def do_GET(self):
                                  body = b'["Default"]'
                                  self.send_response(200)
                                  self.send_header("Content-Type", "application/json")
                                  self.send_header("Content-Length", str(len(body)))
                                  self.end_headers()
                                  self.wfile.write(body)

                              def log_message(self, *args):
                                  pass

                          HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
                      ports:
                        - name: http
                          containerPort: 8080
          - apiVersion: v1
            kind: Service
            metadata:
              name: skyline-domains
            spec:
              selector:
                app: skyline-domains
              ports:
                - name: http
                  port: 80
                  targetPort: 8080
          - apiVersion: gateway.networking.k8s.io/v1
            kind: Gateway
            metadata:
              name: skyline-gateway
            spec:
              gatewayClassName: cilium
              listeners:
                - name: http
                  port: 80
                  protocol: HTTP
                  allowedRoutes:
                    namespaces:
                      from: Same
          - apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              name: skyline-route
            spec:
              parentRefs:
                - name: skyline-gateway
                  group: gateway.networking.k8s.io
                  kind: Gateway
              rules:
                - matches:
                    - path:
                        type: Exact
                        value: /api/openstack/skyline/api/v1/contrib/domains
                  backendRefs:
                    - group: ""
                      kind: Service
                      name: skyline-domains
                      port: 80
                      weight: 1
                - matches:
                    - path:
                        type: PathPrefix
                        value: /
                  backendRefs:
                    - group: ""
                      kind: Service
                      name: skyline-api
                      port: 9999
                      weight: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jsonPointers:
        - /status

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dcp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  project: default
  source:
    repoURL: https://github.com/daigo-suhara/dcp.git
    targetRevision: main
    path: charts/dcp
    helm:
      releaseName: dcp
  destination:
    server: https://kubernetes.default.svc
    namespace: dcp-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/knative/net-istio/releases/download/knative-v1.22.0/net-istio.yaml

# Add an HTTPS (443) server to the Knative ingress Gateway so that
# Istio terminates TLS with our cert-manager-issued wildcard certificate.
# Required when dropping Cloudflare Tunnel and serving HTTPS directly.
patches:
  - target:
      group: networking.istio.io
      kind: Gateway
      name: knative-ingress-gateway
      namespace: knative-serving
    patch: |-
      - op: add
        path: /spec/servers/-
        value:
          port:
            number: 443
            name: https
            protocol: HTTPS
          tls:
            mode: SIMPLE
            credentialName: drkatana-wildcard-tls
          hosts:
            - "*"

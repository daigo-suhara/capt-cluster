apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cinder-volume-rbd-keyring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/daigo-suhara/capt-cluster.git
    targetRevision: HEAD
    path: cluster/argocd/openstack/cinder-volume-rbd-keyring
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true

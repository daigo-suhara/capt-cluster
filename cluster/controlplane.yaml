apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: TinkerbellMachineTemplate
metadata:
  name: control-plane
  namespace: tinkerbell
spec:
  template:
    spec:
      templateRef:
        name: ubuntu-2404-kube-v1.35
      hardwareAffinity:
        required:
          - labelSelector:
              matchLabels:
                cluster-role: control-plane
      bootOptions:
        bootMode: uefi
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: control-plane
  namespace: tinkerbell
spec:
  replicas: 1
  rolloutStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
      kind: TinkerbellMachineTemplate
      name: control-plane
  kubeadmConfigSpec:
    format: cloud-config
    clusterConfiguration:
      apiServer:
        certSANs:
          - 172.16.1.100
          - 127.0.0.1
      controllerManager:
        extraArgs:
          enable-hostpath-provisioner: "true"
    preKubeadmCommands:
      - swapoff -a || true
      - sed -i '/\sswap\s/ s/^/#/' /etc/fstab
    postKubeadmCommands:
      - kubectl --kubeconfig /etc/kubernetes/super-admin.conf apply -f /etc/kubernetes/rbac.yaml
    files:
      - path: /etc/kubernetes/manifests/kube-vip.yaml
        permissions: "0644"
        contentFrom:
          secret:
            name: kubeadm-addons
            key: kube-vip.yaml
      - path: /etc/kubernetes/rbac.yaml
        permissions: "0644"
        contentFrom:
          secret:
            name: kubeadm-addons
            key: rbac.yaml
    users:
      - name: tinkerbell
        sudo: "ALL=(ALL) NOPASSWD:ALL"
        sshAuthorizedKeys:
          - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID+3Q/eAOgoIs0pNtGvQ8ueXK1Gg8CnIdhcU9rwpeMFm suharadaigo"
  version: v1.35.4

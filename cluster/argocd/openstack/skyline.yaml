apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-skyline
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm
    path: skyline
    targetRevision: master
    helm:
      values: |
        # force Argo CD refresh
        helm3_hook: false
        pod:
          replicas:
            skyline: 1
        manifests:
          ingress: true
          service_ingress: true
          job_db_init: true
          job_db_sync: true
          job_ks_user: true
        dependencies:
          static:
            skyline:
              jobs: []
        conf:
          skyline:
            openstack:
              system_user_name: admin
              system_user_password: password
              system_user_domain: default
              system_project: admin
              system_project_domain: default
        extraObjects:
          - apiVersion: gateway.networking.k8s.io/v1
            kind: Gateway
            metadata:
              name: skyline-gateway
            spec:
              gatewayClassName: cilium
              listeners:
                - name: http
                  port: 80
                  protocol: HTTP
                  allowedRoutes:
                    namespaces:
                      from: Same
          - apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              name: skyline-route
            spec:
              parentRefs:
                - name: skyline-gateway
                  group: gateway.networking.k8s.io
                  kind: Gateway
              rules:
                - matches:
                    - path:
                        type: PathPrefix
                        value: /
                  backendRefs:
                    - group: ""
                      kind: Service
                      name: skyline-api
                      port: 9999
                      weight: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jsonPointers:
        - /status

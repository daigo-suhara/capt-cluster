apiVersion: v1
kind: Secret
metadata:
  name: kubeadm-addons
  namespace: tinkerbell
type: Opaque
stringData:
  kube-vip.yaml: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: kube-vip
      namespace: kube-system
    spec:
      containers:
      - args: [ "manager" ]
        env:
        - { name: vip_arp, value: "true" }
        - { name: port, value: "6443" }
        - { name: vip_interface, value: eno1 }
        - { name: vip_address, value: 172.16.1.100 }
        - { name: vip_controlplane, value: "true" }
        - { name: cp_enable, value: "true" }
        - { name: cp_namespace, value: kube-system }
        - { name: vip_leaderelection, value: "true" }
        - { name: vip_lease_duration, value: "5" }
        - { name: vip_renew_deadline, value: "3" }
        - { name: vip_retry_period, value: "1" }
        image: ghcr.io/kube-vip/kube-vip:v0.8.2
        name: kube-vip
        securityContext:
          capabilities: { add: [ "NET_ADMIN", "NET_RAW", "SYS_TIME" ] }
      hostNetwork: true
  rbac.yaml: |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: system:kube-apiserver-to-kubelet
    rules:
      - apiGroups: [""]
        resources: ["nodes/proxy", "nodes/stats", "nodes/log", "nodes/spec", "nodes/metrics"]
        verbs: ["*"]
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: system:kube-apiserver-to-kubelet
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: system:kube-apiserver-to-kubelet
    subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: User
        name: kube-apiserver-kubelet-client

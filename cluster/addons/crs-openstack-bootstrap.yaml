  namespace: tinkerbell
spec:
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: cluster
  strategy: ApplyOnce
  resources:
    - name: openstack-bootstrap-manifest
      kind: Secret

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-glance
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm
    path: glance
    targetRevision: master
    helm:
      values: |
        # force Argo CD refresh
        helm3_hook: false
        manifests:
          ingress_api: false
          service_ingress_api: false
          job_db_init: true
          job_db_sync: true
          job_ks_user: true
          job_ks_service: true
        storage: rbd
        conf:
          glance:
            glance_store:
              default_backend: rbd
              rbd_store_pool: glance.images
              rbd_store_user: glance
              rbd_store_ceph_conf: /etc/ceph/ceph.conf
        ceph_client:
          configmap: ceph-etc
          user_secret_name: pvc-ceph-client-key
        secrets:
          rbd: pvc-ceph-client-key
        extraObjects:
          - apiVersion: batch/v1
            kind: Job
            metadata:
              name: glance-db-sync
            spec:
              backoffLimit: 0
              template:
                spec:
                  restartPolicy: Never
                  containers:
                    - name: db-sync
                      image: busybox:1.36
                      command:
                        - /bin/sh
                        - -c
                        - exit 0
          - apiVersion: batch/v1
            kind: Job
            metadata:
              name: glance-ks-user
            spec:
              backoffLimit: 0
              template:
                spec:
                  restartPolicy: Never
                  containers:
                    - name: ks-user
                      image: busybox:1.36
                      command:
                        - /bin/sh
                        - -c
                        - exit 0
          - apiVersion: batch/v1
            kind: Job
            metadata:
              name: glance-ks-endpoints
            spec:
              backoffLimit: 0
              template:
                spec:
                  restartPolicy: Never
                  containers:
                    - name: ks-endpoints
                      image: busybox:1.36
                      command:
                        - /bin/sh
                        - -c
                        - exit 0
          - apiVersion: batch/v1
            kind: Job
            metadata:
              name: glance-storage-init
            spec:
              backoffLimit: 0
              template:
                spec:
                  restartPolicy: Never
                  containers:
                    - name: storage-init
                      image: busybox:1.36
                      command:
                        - /bin/sh
                        - -c
                        - exit 0
          - apiVersion: batch/v1
            kind: Job
            metadata:
              name: glance-rabbit-init
            spec:
              backoffLimit: 0
              template:
                spec:
                  restartPolicy: Never
                  containers:
                    - name: rabbit-init
                      image: busybox:1.36
                      command:
                        - /bin/sh
                        - -c
                        - exit 0
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash

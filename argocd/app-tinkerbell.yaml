apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tinkerbell
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/tinkerbell/charts
    chart: stack
    targetRevision: 0.22.1
    helm:
      values: |
        stack:
          interface: eno1
          loadBalancerIP: 172.16.1.10
        hegel:
          trustedProxies: [10.0.0.0/8]
  destination:
    server: https://kubernetes.default.svc
    namespace: tinkerbell
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineDeployment
metadata:
  name: worker
  namespace: tinkerbell
spec:
  clusterName: cluster
  replicas: 0
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: cluster
  rollout:
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: cluster
    spec:
      clusterName: cluster
      version: v1.35.4
      bootstrap:
        configRef:
          apiGroup: bootstrap.cluster.x-k8s.io
          kind: KubeadmConfigTemplate
          name: worker
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: TinkerbellMachineTemplate
        name: worker
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: worker
  namespace: tinkerbell
spec:
  template:
    spec:
      format: cloud-config
      ntp:
        enabled: true
        ntp_client: chrony
        servers:
          - ntp.nict.jp
        pools:
          - pool.ntp.org
      users:
        - name: tinkerbell
          sudo: "ALL=(ALL) NOPASSWD:ALL"
          sshAuthorizedKeys:
            - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID+3Q/eAOgoIs0pNtGvQ8ueXK1Gg8CnIdhcU9rwpeMFm suharadaigo"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: TinkerbellMachineTemplate
metadata:
  name: worker
  namespace: tinkerbell
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  template:
    spec:
      bootOptions:
        bootMode: netboot
      hardwareAffinity:
        required:
          - labelSelector:
              matchLabels:
                cluster-role: worker

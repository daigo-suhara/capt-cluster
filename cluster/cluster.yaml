apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: cluster
  namespace: tinkerbell
  labels:
    cni: cilium
spec:
  controlPlaneEndpoint:
    host: 172.16.1.100
    port: 6443
  clusterNetwork:
    pods:
      cidrBlocks: ["10.0.0.0/16"]
    services:
      cidrBlocks: ["10.96.0.0/12"]
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: control-plane
    namespace: tinkerbell
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: TinkerbellCluster
    name: cluster
    namespace: tinkerbell
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: TinkerbellCluster
metadata:
  name: cluster
  namespace: tinkerbell
spec:
  controlPlaneEndpoint:
    host: 172.16.1.100
    port: 6443
  imageLookupBaseRegistry: ghcr.io/tinkerbell/cluster-api-provider-tinkerbell
  imageLookupFormat: '{{.BaseRegistry}}/{{.OSDistro}}:{{.OSVersion}}-{{.KubernetesVersion}}-amd64.gz'
  imageLookupOSDistro: ubuntu
  imageLookupOSVersion: "24.04"
  templateOverride: |
    version: "0.1"
    name: {{.Name}}
    global_timeout: 6000
    tasks:
      - name: "{{.Name}}"
        worker: "{{.device_1}}"
        volumes:
          - /dev:/dev
          - /dev/console:/dev/console
          - /lib/firmware:/lib/firmware:ro
        actions:
          - name: "stream image"
            image: quay.io/tinkerbell/actions/oci2disk
            timeout: 600
            environment:
              IMG_URL: ghcr.io/tinkerbell/cluster-api-provider-tinkerbell/ubuntu:2404-v1.35.4-amd64.gz
              DEST_DISK: {{ index .Hardware.Disks 0 }}
              COMPRESSED: true
          - name: "add tink cloud-init config"
            image: quay.io/tinkerbell/actions/writefile
            timeout: 90
            environment:
              DEST_DISK: {{ formatPartition ( index .Hardware.Disks 0 ) 3 }}
              FS_TYPE: ext4
              DEST_PATH: /etc/cloud/cloud.cfg.d/10_tinkerbell.cfg
              UID: 0
              GID: 0
              MODE: 0600
              DIRMODE: 0700
              CONTENTS: |
                datasource:
                  Ec2:
                    metadata_urls: ["http://172.16.1.10:50061"]
                    strict_id: false
                system_info:
                  default_user:
                    name: tink
                    groups: [wheel, adm]
                    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
                    shell: /bin/bash
                manage_etc_hosts: localhost
                warnings:
                  dsid_missing_source: off
          - name: "add tink cloud-init ds-config"
            image: quay.io/tinkerbell/actions/writefile
            timeout: 90
            environment:
              DEST_DISK: {{ formatPartition ( index .Hardware.Disks 0 ) 3 }}
              FS_TYPE: ext4
              DEST_PATH: /etc/cloud/ds-identify.cfg
              UID: 0
              GID: 0
              MODE: 0600
              DIRMODE: 0700
              CONTENTS: |
                datasource: Ec2
          - name: "kexec image"
            image: ghcr.io/jacobweinstock/waitdaemon:latest
            timeout: 90
            pid: host
            environment:
              BLOCK_DEVICE: {{ formatPartition ( index .Hardware.Disks 0 ) 1 }}
              FS_TYPE: vfat
              IMAGE: quay.io/tinkerbell/actions/kexec
              WAIT_SECONDS: 5
            volumes:
              - /var/run/docker.sock:/var/run/docker.sock

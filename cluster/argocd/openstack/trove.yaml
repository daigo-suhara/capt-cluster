apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-trove
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "14"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm
    path: trove
    targetRevision: master
    helm:
      values: |
        helm3_hook: false
        manifests:
          job_bootstrap: true
          job_db_init: true
          job_db_sync: true
          job_ks_user: true
          job_ks_service: true
          job_ks_endpoints: true
          job_rabbit_init: true
        extraObjects:
          - apiVersion: batch/v1
            kind: Job
            metadata:
              name: trove-postgresql-bootstrap
            spec:
              backoffLimit: 0
              template:
                spec:
                  restartPolicy: Never
                  containers:
                    - name: bootstrap
                      image: quay.io/airshipit/trove:2026.1-ubuntu_noble
                      imagePullPolicy: IfNotPresent
                      envFrom:
                        - secretRef:
                            name: trove-keystone-admin
                      volumeMounts:
                        - name: workdir
                          mountPath: /work
                      command:
                        - /bin/sh
                        - -ec
                        - |
                          IMAGE_NAME=trove-master-guest-ubuntu-noble
                          IMAGE_URL=https://tarballs.opendev.org/openstack/trove/images/${IMAGE_NAME}.qcow2
                          IMAGE_FILE=/work/${IMAGE_NAME}.qcow2

                          mkdir -p /work

                          if ! /var/lib/openstack/bin/openstack datastore show postgresql >/dev/null 2>&1; then
                            /var/lib/openstack/bin/trove-manage --config-file /etc/trove/trove.conf datastore_update postgresql ""
                          fi

                          if ! /var/lib/openstack/bin/openstack image show "${IMAGE_NAME}" >/dev/null 2>&1; then
                            curl -L --fail --retry 3 --retry-all-errors -o "${IMAGE_FILE}" "${IMAGE_URL}"
                            /var/lib/openstack/bin/openstack image create \
                              "${IMAGE_NAME}" \
                              --private \
                              --disk-format qcow2 \
                              --container-format bare \
                              --file "${IMAGE_FILE}" \
                              --property hw_rng_model=virtio \
                              --tag trove \
                              --tag postgresql
                          fi

                          IMAGE_ID=$(/var/lib/openstack/bin/openstack image show "${IMAGE_NAME}" -f value -c id)

                          for version in 12 16 17; do
                            /var/lib/openstack/bin/trove-manage --config-file /etc/trove/trove.conf datastore_version_update \
                              postgresql "${version}" postgresql "${IMAGE_ID}" "" 1 --version "${version}"
                            /var/lib/openstack/bin/trove-manage --config-file /etc/trove/trove.conf db_load_datastore_config_parameters \
                              postgresql "${version}" /var/lib/openstack/lib/python3.12/site-packages/trove/templates/postgresql/validation-rules.json
                          done

                          /var/lib/openstack/bin/trove-manage --config-file /etc/trove/trove.conf datastore_update postgresql 17
                  volumes:
                    - name: workdir
                      emptyDir:
                        sizeLimit: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tinkerbell-stack
  namespace: argocd
spec:
  project: default
  source:
    path: system/apps/tinkerbell-stack/manifests
    repoURL: https://github.com/your-username/capt-cluster.git # 後ほど要変更
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: tinkerbell
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: TinkerbellMachineTemplate
metadata:
  name: control-plane
  namespace: tinkerbell
spec:
  template:
    spec:
      templateRef:
        name: ubuntu-2404-kube-v1.35
      hardwareAffinity:
        required:
          - labelSelector:
              matchLabels:
                cluster-role: control-plane
      bootOptions:
        bootMode: uefi
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: control-plane
  namespace: tinkerbell
spec:
  replicas: 1
  rolloutStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
      kind: TinkerbellMachineTemplate
      name: control-plane
  kubeadmConfigSpec:
    format: cloud-config
    clusterConfiguration:
      apiServer:
        certSANs:
          - 172.16.1.100
          - 127.0.0.1
      controllerManager:
        extraArgs:
          enable-hostpath-provisioner: "true"
    preKubeadmCommands:
      - swapoff -a || true
      - sed -i '/\sswap\s/ s/^/#/' /etc/fstab
    postKubeadmCommands:
      - |
        kubectl --kubeconfig /etc/kubernetes/super-admin.conf apply -f - <<KEOF
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: system:kube-apiserver-to-kubelet
        rules:
          - apiGroups: [""]
            resources: ["nodes/proxy", "nodes/stats", "nodes/log", "nodes/spec", "nodes/metrics"]
            verbs: ["*"]
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: system:kube-apiserver-to-kubelet
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: system:kube-apiserver-to-kubelet
        subjects:
          - apiGroup: rbac.authorization.k8s.io
            kind: User
            name: kube-apiserver-kubelet-client
        KEOF
    files:
      - content: |
          apiVersion: v1
          kind: Pod
          metadata:
            name: kube-vip
            namespace: kube-system
          spec:
            containers:
            - args: [ "manager" ]
              env:
              - { name: vip_arp, value: "true" }
              - { name: port, value: "6443" }
              - { name: vip_interface, value: eno1 }
              - { name: vip_address, value: 172.16.1.100 }
              - { name: vip_controlplane, value: "true" }
              - { name: cp_enable, value: "true" }
              - { name: cp_namespace, value: kube-system }
              - { name: vip_leaderelection, value: "true" }
              - { name: vip_lease_duration, value: "5" }
              - { name: vip_renew_deadline, value: "3" }
              - { name: vip_retry_period, value: "1" }
              image: ghcr.io/kube-vip/kube-vip:v0.8.2
              name: kube-vip
              securityContext:
                capabilities: { add: [ "NET_ADMIN", "NET_RAW", "SYS_TIME" ] }
            hostNetwork: true
        path: /etc/kubernetes/manifests/kube-vip.yaml
        permissions: "0644"
    users:
      - name: tinkerbell
        sudo: "ALL=(ALL) NOPASSWD:ALL"
        sshAuthorizedKeys:
          - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID+3Q/eAOgoIs0pNtGvQ8ueXK1Gg8CnIdhcU9rwpeMFm suharadaigo"
  version: v1.35.4

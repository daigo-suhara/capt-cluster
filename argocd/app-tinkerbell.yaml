apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tinkerbell
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/daigo-suhara/capt-cluster.git
    targetRevision: HEAD
    path: system/tinkerbell-stack
    helm:
      values: |
        publicIP: 172.16.1.10
        artifactsFileServer: http://172.16.1.10:7173
        trustedProxies:
          - 10.0.0.0/8
        deployment:
          init:
            sourceInterface: eno1
        optional:
          kubevip:
            interface: eno1
  destination:
    server: https://kubernetes.default.svc
    namespace: tinkerbell
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: batch/v1
kind: Job
metadata:
  generateName: openstack-bootstrap-magnum-
  namespace: openstack
  labels:
    app.kubernetes.io/name: openstack-bootstrap-magnum
    app.kubernetes.io/part-of: openstack-bootstrap
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,HookFailed
spec:
  backoffLimit: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: openstack-bootstrap-magnum
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openstack-bootstrap-magnum
        app.kubernetes.io/part-of: openstack-bootstrap
    spec:
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: quay.io/airshipit/openstack-client:2026.1-ubuntu_noble
          imagePullPolicy: IfNotPresent
          env:
            - name: BOOTSTRAP_TARGET
              value: magnum
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: OS_AUTH_URL
              value: http://keystone-api.openstack.svc.cluster.local:5000/v3
            - name: OS_USERNAME
              value: admin
            - name: OS_PASSWORD
              value: password
            - name: OS_PROJECT_NAME
              value: admin
            - name: OS_USER_DOMAIN_NAME
              value: Default
            - name: OS_PROJECT_DOMAIN_NAME
              value: Default
            - name: OS_INTERFACE
              value: internal
            - name: OS_IDENTITY_API_VERSION
              value: "3"
          command:
            - /bin/sh
            - /scripts/bootstrap.sh
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: openstack-bootstrap-script
            defaultMode: 0755

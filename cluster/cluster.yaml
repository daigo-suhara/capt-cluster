apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: cluster
  namespace: tinkerbell
  labels:
    cni: cilium
spec:
  controlPlaneEndpoint:
    host: 172.16.1.100
    port: 6443
  clusterNetwork:
    pods:
      cidrBlocks: ["10.0.0.0/16"]
    services:
      cidrBlocks: ["10.96.0.0/12"]
  controlPlaneRef:
    apiGroup: controlplane.cluster.x-k8s.io
    kind: KubeadmControlPlane
    name: control-plane
  infrastructureRef:
    apiGroup: infrastructure.cluster.x-k8s.io
    kind: TinkerbellCluster
    name: cluster
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: TinkerbellCluster
metadata:
  name: cluster
  namespace: tinkerbell
spec:
  controlPlaneEndpoint:
    host: 172.16.1.100
    port: 6443
  imageLookupBaseRegistry: ghcr.io/tinkerbell/cluster-api-provider-tinkerbell
  imageLookupFormat: '{{.BaseRegistry}}/{{.OSDistro}}:{{.OSVersion}}-{{.KubernetesVersion}}-amd64.gz'
  imageLookupOSDistro: ubuntu
  imageLookupOSVersion: "24.04"
  templateOverrideRef:
    name: cluster-provisioning-template
    namespace: tinkerbell

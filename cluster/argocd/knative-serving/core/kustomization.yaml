apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/knative/serving/releases/download/knative-v1.22.0/serving-core.yaml
  - https://github.com/knative-extensions/net-kourier/releases/download/knative-v1.22.0/kourier.yaml

patches:
  - target:
      kind: ConfigMap
      name: config-network
      namespace: knative-serving
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: config-network
        namespace: knative-serving
      data:
        ingress-class: kourier.ingress.networking.knative.dev
        external-domain-tls: "Disabled"
        autocreate-cluster-domain-claims: "true"

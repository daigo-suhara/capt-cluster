apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-neutron
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm
    path: neutron
    targetRevision: master
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

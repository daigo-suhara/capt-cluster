apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: openstack-mariadb
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm.git
    path: mariadb
    targetRevision: master
    helm:
      releaseName: mariadb
      valuesObject:
        volume:
          class_name: ceph-block
  destination:
    name: tinkerbell
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

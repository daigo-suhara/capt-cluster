apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-neutron
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm
    path: neutron
    targetRevision: master
    helm:
      values: |
        # force Argo CD refresh
        helm3_hook: false
        manifests:
          ingress_server: true
          service_ingress_server: true
          job_db_init: true
          job_db_sync: true
          job_ks_user: true
          job_ks_service: true
          job_ks_endpoints: true
          job_rabbit_init: true
        conf:
          auto_bridge_add:
            br-ex: eno1
          neutron:
            DEFAULT:
              l3_ha: false
              max_l3_agents_per_router: 1
          plugins:
            ml2_conf:
              ml2_type_flat:
                flat_networks: public
            openvswitch_agent:
              ovs:
                bridge_mappings: public:br-ex
        dependencies:
          static:
            server:
              jobs: []
            dhcp:
              jobs: []
            l3:
              jobs: []
            metadata:
              jobs: []
            ovs_agent:
              jobs: []
            rpc_server:
              jobs: []
            lb_agent:
              jobs: []
            ks_user:
              jobs: []
            ks_endpoints:
              jobs: []
            rabbit_init:
              jobs: []
        endpoints:
          oslo_messaging:
            host_fqdn_override:
              default: rabbitmq.openstack.svc.cluster.local
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash

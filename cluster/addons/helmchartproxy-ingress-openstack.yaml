apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: ingress-openstack
  namespace: tinkerbell
spec:
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: cluster
  releaseName: ingress-openstack
  repoURL: https://kubernetes.github.io/ingress-nginx
  chartName: ingress-nginx
  version: 4.11.3
  namespace: ingress-openstack
  options:
    enableClientCache: false
    waitForJobs: true
    wait: true
    timeout: 10m0s
    install:
      createNamespace: true
    upgrade:
      maxHistory: 10
  valuesTemplate: |-
    controller:
      ingressClass: ingress-openstack
      ingressClassResource:
        name: ingress-openstack
        enabled: true
        default: false
        controllerValue: k8s.io/ingress-nginx
      podLabels:
        app: ingress-api
      publishService:
        enabled: true
      service:
        type: ClusterIP

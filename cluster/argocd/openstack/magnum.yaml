apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-magnum
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "14"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm
    path: magnum
    targetRevision: master
    helm:
      values: |
        helm3_hook: false
        conf:
          magnum:
            api:
              workers: 1
          magnum_api_uwsgi:
            uwsgi:
              wsgi-file: ""
              module: "magnum.api.app:build_wsgi_app()"
          paste:
            pipeline:main:
              pipeline: "cors request_id authtoken api_v1"
        manifests:
          job_ks_user_domain: true
          job_bootstrap: true
          job_db_init: true
          job_db_sync: true
          job_image_repo_sync: true
          job_ks_endpoints: true
          job_ks_service: true
          job_ks_user: true
          job_rabbit_init: true
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash

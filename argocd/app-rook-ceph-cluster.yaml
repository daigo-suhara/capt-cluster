apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  name: rook-ceph-cluster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.rook.io/release
    chart: rook-ceph-cluster
    targetRevision: v1.19.5
    helm:
      releaseName: rook-ceph-cluster
      valuesObject:
        operatorNamespace: rook-ceph
        toolbox:
          enabled: true
        cephClusterSpec:
          dataDirHostPath: /var/lib/rook
          mon:
            count: 3
            allowMultiplePerNode: false
          mgr:
            count: 2
            allowMultiplePerNode: false
          storage:
            useAllNodes: true
            useAllDevices: true
        cephBlockPools:
          - name: ceph-blockpool
            spec:
              failureDomain: host
              replicated:
                size: 3
            storageClass:
              enabled: true
              name: ceph-block
              isDefault: true
              reclaimPolicy: Delete
              allowVolumeExpansion: true
              volumeBindingMode: Immediate
              parameters:
                imageFormat: "2"
                imageFeatures: layering
                csi.storage.k8s.io/fstype: ext4
          - name: volumes
            spec:
              failureDomain: host
              replicated:
                size: 3
            storageClass:
              enabled: false
          - name: images
            spec:
              failureDomain: host
              replicated:
                size: 3
            storageClass:
              enabled: false
          - name: vms
            spec:
              failureDomain: host
              replicated:
                size: 3
            storageClass:
              enabled: false
        cephFileSystems:
          - name: ceph-filesystem
            spec:
              metadataPool:
                replicated:
                  size: 3
              dataPools:
                - name: data0
                  failureDomain: host
                  replicated:
                    size: 3
              metadataServer:
                activeCount: 1
                activeStandby: true
            storageClass:
              enabled: true
              name: ceph-filesystem
              isDefault: false
              pool: data0
              reclaimPolicy: Delete
              allowVolumeExpansion: true
              volumeBindingMode: Immediate
              parameters:
                csi.storage.k8s.io/fstype: ext4
  destination:
    server: https://172.16.1.100:6443
    namespace: rook-ceph
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hardware
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/daigo-suhara/capt-cluster.git
    targetRevision: HEAD
    path: hardware
  destination:
    server: https://172.16.1.100:6443
    namespace: tinkerbell
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: tinkerbell.org
      kind: Hardware
      jsonPointers:
        - /spec/userData

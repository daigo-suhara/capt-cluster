apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-cinder
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm
    path: cinder
    targetRevision: master
    helm:
      values: |
        helm3_hook: false
        manifests:
          job_db_init: true
          job_db_sync: true
          job_ks_user: true
          job_ks_service: true
        storage: ceph
        conf:
          cinder:
            DEFAULT:
              enabled_backends: ceph
          backends:
            ceph:
              volume_driver: cinder.volume.drivers.rbd.RBDDriver
              volume_backend_name: ceph
              rbd_pool: rbd
              rbd_user: cinder
              rbd_secret_uuid: 457f605d-adaa-4710-83b9-331487137b01 # Placeholder
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash

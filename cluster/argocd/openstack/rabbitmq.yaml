apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-rabbitmq
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm
    path: rabbitmq
    targetRevision: master
    helm:
      values: |
        # force Argo CD refresh
        helm3_hook: false
        pod:
          replicas:
            server: 1
        manifests:
          ingress_management: false
          service_ingress_management: false
        network:
          management:
            ingress:
              public: false
        extraObjects:
          - apiVersion: gateway.networking.k8s.io/v1
            kind: GatewayClass
            metadata:
              name: eg
            spec:
              controllerName: gateway.envoyproxy.io/gatewayclass-controller
          - apiVersion: gateway.networking.k8s.io/v1
            kind: Gateway
            metadata:
              name: rabbitmq-gateway
            spec:
              gatewayClassName: eg
              listeners:
                - name: http
                  port: 80
                  protocol: HTTP
                  allowedRoutes:
                    namespaces:
                      from: Same
          - apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              name: rabbitmq-route
            spec:
              parentRefs:
                - name: rabbitmq-gateway
              rules:
                - matches:
                    - path:
                        type: PathPrefix
                        value: /
                  backendRefs:
                    - name: rabbitmq
                      port: 15672
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash

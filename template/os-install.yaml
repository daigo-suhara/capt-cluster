apiVersion: tinkerbell.org/v1alpha1
kind: Template
metadata:
  name: os-install
  namespace: tinkerbell
spec:
  data: |
    version: "0.1"
    name: os-install
    steps:
    - name: "image2disk"
      image: "quay.io/tinkerbell-actions/image2disk:v1.0.0"
      timeout: 600
      args:
      - "--img"
      - "https://nbg1.your-objectstorage.com/osism/openstack-k8s-capi-images/ubuntu-2404-kube-v1.35/ubuntu-2404-kube-v1.35.qcow2"
      - "--dest"
      - "/dev/sda"
    - name: "kexec"
      image: "quay.io/tinkerbell-actions/kexec:v1.0.0"
      args:
      - "--type"
      - "kexec"

apiVersion: tinkerbell.org/v1alpha1
kind: Template
metadata:
  name: cluster-provisioning-template-v3
  namespace: tinkerbell
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  data: |
    version: "0.1"
    name: cluster-provisioning-template-v3
    global_timeout: 6000
    tasks:
      - name: "debug-and-kexec"
        worker: "{{.device_1}}"
        volumes:
          - /dev:/dev
        actions:
          - name: "stream image"
            image: quay.io/tinkerbell/actions/oci2disk
            timeout: 1200
            environment:
              IMG_URL: ghcr.io/tinkerbell/cluster-api-provider-tinkerbell/ubuntu:2404-v1.35.4-amd64.gz
              DEST_DISK: {{ index .Hardware.Disks 0 }}
              COMPRESSED: true
          - name: "disk-inspection"
            image: alpine:3
            timeout: 120
            pid: host
            command: ["sh", "-c", "echo '--- PARTITION SCAN ---' && fdisk -l {{ index .Hardware.Disks 0 }} && for p in 1 2 3; do echo \"--- MOUNTING /dev/sda$p ---\" && mkdir -p /mnt/$p && mount {{ index .Hardware.Disks 0 }}$p /mnt/$p 2>/dev/null && (find /mnt/$p -name vmlinuz -o -name grub.cfg | head -n 10 && umount /mnt/$p) || echo \"Failed to mount /dev/sda$p\"; done"]
          - name: "reboot"
            image: ghcr.io/jacobweinstock/waitdaemon:latest
            timeout: 90
            pid: host
            command: ["reboot"]
            environment:
              IMAGE: alpine
            volumes:
              - /var/run/docker.sock:/var/run/docker.sock

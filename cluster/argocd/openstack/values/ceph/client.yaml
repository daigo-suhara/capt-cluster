bootstrap:
  enabled: true
  script: |
    ceph -s
    function ensure_pool () {
      ceph osd pool stats "$1" || ceph osd pool create "$1" "$2"
      if [[ $(ceph mon versions | awk '/version/{print $3}' | cut -d. -f1) -ge 12 ]]; then
        ceph osd pool application enable "$1" "$3"
      fi
    }
    ensure_pool rbd 8 rbd
    ensure_pool cinder.volumes 8 cinder
    ensure_pool nova-vms 8 nova

labels:
  job:
    node_selector_key: cluster-role
    node_selector_value: control-plane
  test:
    node_selector_key: cluster-role
    node_selector_value: control-plane

conf:
  pool:
    spec:
      - application: rbd
        name: rbd
        percent_total_data: 40
        replication: 3
      - application: cinder
        name: cinder.volumes
        percent_total_data: 10
        replication: 3
      - application: nova
        name: nova-vms
        percent_total_data: 20
        replication: 3

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tinkerbell
  namespace: argocd
spec:
  project: default
  source:
    path: system/tinkerbell
    repoURL: https://github.com/daigo-suhara/capt-cluster.git
    targetRevision: HEAD
    kustomize:
      buildOptions: "- --enable-helm"
  destination:
    server: https://kubernetes.default.svc
    namespace: tinkerbell
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

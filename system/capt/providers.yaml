apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: CoreProvider
metadata:
  name: cluster-api
  namespace: capi-system
spec:
  version: v1.12.5
---
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: BootstrapProvider
metadata:
  name: kubeadm
  namespace: capi-kubeadm-bootstrap-system
spec:
  version: v1.12.5
---
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: ControlPlaneProvider
metadata:
  name: kubeadm
  namespace: capi-kubeadm-control-plane-system
spec:
  version: v1.12.5
---
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: InfrastructureProvider
metadata:
  name: tinkerbell
  namespace: capt-system
spec:
  version: v0.0.0
  configSecret:
    name: tinkerbell-variables
  fetchConfig:
    oci: ghcr.io/tinkerbell/cluster-api-provider-tinkerbell:v0.7.0
---
apiVersion: v1
kind: Secret
metadata:
  name: tinkerbell-variables
  namespace: capt-system
type: Opaque
stringData:
  TINKERBELL_IP: 172.16.0.10

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-nova
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm
    path: nova
    targetRevision: master
    helm:
      values: |
        # force Argo CD refresh
        helm3_hook: false
        manifests:
          job_db_init: true
          job_db_sync: true
          job_ks_user: true
          job_ks_service: true
          job_storage_init: false
          service_ingress_metadata: true
          service_ingress_novncproxy: true
          service_ingress_osapi: true
          service_ingress_serialproxy: true
          service_ingress_spiceproxy: true
        conf:
          ceph:
            enabled: true
            cinder:
              user: cinder
              keyring: AQCEawxqDbU8GBAAisYBswfj/NG2mG9dS7irGA==
          nova:
            DEFAULT:
              transport_url: rabbit://nova:password@rabbitmq.openstack.svc.cluster.local:5672/nova
            keystone_authtoken:
              username: nova
              password: password
              project_name: service
              user_domain_name: service
              project_domain_name: service
            service_user:
              username: nova_service_user
              password: password
              project_name: service
              user_domain_name: service
              project_domain_name: service
            libvirt:
              virt_type: kvm
              images_type: rbd
              images_rbd_pool: vms
              images_rbd_ceph_conf: /etc/ceph/ceph.conf
              rbd_user: nova
              rbd_secret_uuid: 457f605d-adaa-4710-83b9-331487137b01 # Placeholder
        endpoints:
          oslo_messaging:
            host_fqdn_override:
              default: rabbitmq.openstack.svc.cluster.local
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /metadata/annotations/configmap-etc-hash
        - /metadata/annotations/configmap-bin-hash

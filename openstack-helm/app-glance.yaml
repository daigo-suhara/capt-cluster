apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  name: openstack-glance
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm.git
    path: glance
    targetRevision: master
    helm:
      releaseName: glance
      valuesObject:
        storage: rbd
        conf:
          glance:
            glance_store:
              default_store: rbd
  destination:
    server: https://172.16.1.100:6443
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

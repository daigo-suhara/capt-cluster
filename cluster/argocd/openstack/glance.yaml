apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-glance
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm
    path: glance
    targetRevision: master
    helm:
      values: |
        manifests:
          job_db_init: true
          job_db_sync: true
          job_ks_user: true
          job_ks_service: true
        storage: ceph
        conf:
          glance:
            glance_store:
              default_store: rbd
              stores: rbd,file
              rbd_store_pool: images
              rbd_store_user: glance
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

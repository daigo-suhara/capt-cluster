apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"

  name: cluster
  namespace: argocd
spec:
  project: default
  source:
    path: cluster
    repoURL: https://github.com/daigo-suhara/capt-cluster.git
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: tinkerbell
  syncPolicy:
    syncOptions:
      - ServerSideApply=true

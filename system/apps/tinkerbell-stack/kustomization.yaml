apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
helmCharts:
  - name: stack
    releaseName: tinkerbell
    version: 0.3.0
    repo: https://tinkerbell.github.io/charts
    valuesInline:
      stack:
        interface: eno1
        loadBalancerIP: 172.16.1.10
      hegel:
        trustedProxies: [10.0.0.0/8]

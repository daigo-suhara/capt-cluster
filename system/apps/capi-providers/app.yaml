apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: capi-providers
  namespace: argocd
spec:
  project: default
  source:
    path: system/apps/capi-providers/manifests
    repoURL: https://github.com/daigo-suhara/capt-cluster.git
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: capi-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

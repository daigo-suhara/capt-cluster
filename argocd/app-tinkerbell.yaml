apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tinkerbell
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/tinkerbell/charts/tinkerbell
    path: .
    targetRevision: v0.22.1
    helm:
      values: |
        deployment:
          hostNetwork: true
          init:
            enabled: false
          envs:
            smee:
              dhcpBindInterface: enx00e04c247a98
              dhcpTftpIP: 172.16.1.10
              dhcpIpxeHttpBinaryHost: 172.16.1.10
              dhcpIpxeHttpScriptHost: 172.16.1.10
              ipxeHttpScriptBindAddr: 0.0.0.0
              tftpServerBindAddr: 0.0.0.0
            tinkServer:
              bindAddr: 0.0.0.0
            tootles:
              bindAddr: 0.0.0.0
        publicIP: 172.16.1.10
        artifactsFileServer: http://172.16.1.10:7173
        trustedProxies:
          - 10.0.0.0/8
  destination:
    server: https://kubernetes.default.svc
    namespace: tinkerbell
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      namespace: tinkerbell
      name: hook-artifacts
      jsonPointers:
        - /spec/volumeName

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rook-ceph-tools
  namespace: rook-ceph
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rook-ceph-tools
  template:
    metadata:
      labels:
        app: rook-ceph-tools
    spec:
      containers:
        - name: ceph-tools
          image: quay.io/ceph/ceph:v19.2.3
          command:
            - /bin/bash
            - -ec
            - |
              for _ in {1..60}; do
                MON_HOST="$(cat /rook-config/mon_host 2>/dev/null || true)"
                [ -n "${MON_HOST}" ] && break
                sleep 5
              done
              [ -n "${MON_HOST}" ]
              cat >/etc/ceph/ceph.conf <<EOF
              [global]
              mon host = ${MON_HOST}
              EOF
              sleep infinity
          volumeMounts:
            - name: ceph-conf
              mountPath: /etc/ceph
            - name: rook-config
              mountPath: /rook-config
              readOnly: true
            - name: admin-keyring
              mountPath: /etc/ceph/ceph.client.admin.keyring
              subPath: keyring
              readOnly: true
      volumes:
        - name: ceph-conf
          emptyDir: {}
        - name: rook-config
          secret:
            secretName: rook-ceph-config
        - name: admin-keyring
          secret:
            secretName: rook-ceph-admin-keyring
